<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas Interactivas - Intervenciones Viales</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #eef5fc 0%, #d2e4f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: #1e3a8a;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            padding: 1rem;
            position: relative;
            padding-top: 5rem; /* Espacio para la etiqueta flotante */
        }

        /* Instrucción flotante */
        .instruction-badge {
            position: absolute;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(37, 99, 235, 0.2);
            color: #2563eb;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.05);
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.08), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.5);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 380px;
        }

        /* Fondos geométricos abstractos únicos para cada tarjeta */
        .card-1 .card-bg {
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.15), rgba(0, 51, 153, 0.05)),
                        radial-gradient(circle at 80% 20%, rgba(26, 115, 232, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(139, 195, 74, 0.15) 0%, transparent 40%);
        }

        .card-2 .card-bg {
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.15), rgba(3, 4, 94, 0.05)),
                        radial-gradient(circle at 10% 30%, rgba(0, 119, 182, 0.2) 0%, transparent 60%),
                        radial-gradient(circle at 90% 90%, rgba(72, 202, 228, 0.25) 0%, transparent 50%);
        }

        .card-3 .card-bg {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(49, 46, 129, 0.05)),
                        radial-gradient(circle at 50% 10%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            transition: transform 0.6s ease;
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        .card-hint {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2563eb;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: auto;
        }

        .card-hint::after {
            content: '→';
            transition: transform 0.3s ease;
        }

        /* Efectos Hover */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(30, 58, 138, 0.15);
            border-color: rgba(37, 99, 235, 0.3);
            background: rgba(255, 255, 255, 0.85);
        }

        .card:hover .card-bg {
            transform: scale(1.08);
        }

        .card:hover .card-hint::after {
            transform: translateX(5px);
        }

        /* Ventanas Emergentes (Modals) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #ffffff;
            border-radius: 28px;
            width: 100%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            transform: scale(0.92);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: #64748b;
            transition: all 0.2s ease;
        }

        .modal-close-btn:hover, .modal-close-btn:focus {
            background: #e2e8f0;
            color: #0f172a;
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.5rem;
            padding-right: 2rem;
            line-height: 1.3;
            border-left: 5px solid #2563eb;
            padding-left: 12px;
        }

        .modal-body {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #334155;
        }

        .modal-body ul {
            list-style-type: none;
        }

        .modal-body li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .modal-body li::before {
            content: "•";
            color: #2563eb;
            font-size: 1.5rem;
            position: absolute;
            left: 0;
            top: -2px;
        }
        
        .modal-body li:last-child {
            margin-bottom: 0;
        }

        .modal-box::-webkit-scrollbar {
            width: 8px;
        }
        .modal-box::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 0 28px 28px 0;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .modal-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="instruction-badge">
            <span>💡</span> Haga clic sobre las tarjetas para ampliar la información.
        </div>

        <div class="card card-1" onclick="openModal(1)" role="button" tabindex="0" id="card-1">
            <div class="card-bg"></div>
            <div class="card-content">
                <h2 class="card-title">Intervenciones dirigidas a la capacidad:</h2>
                <div class="card-hint">Ver contenido completo</div>
            </div>
        </div>

        <div class="card card-2" onclick="openModal(2)" role="button" tabindex="0" id="card-2">
            <div class="card-bg"></div>
            <div class="card-content">
                <h2 class="card-title">Intervenciones dirigidas a la oportunidad:</h2>
                <div class="card-hint">Ver contenido completo</div>
            </div>
        </div>

        <div class="card card-3" onclick="openModal(3)" role="button" tabindex="0" id="card-3">
            <div class="card-bg"></div>
            <div class="card-content">
                <h2 class="card-title">Intervenciones dirigidas a la motivación:</h2>
                <div class="card-hint">Ver contenido completo</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="modal-close-btn" id="closeBtn" onclick="closeModalDirect()" aria-label="Cerrar ventana">✕</button>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const data = {
            1: {
                title: "Intervenciones dirigidas a la capacidad:",
                content: `
                    <ul>
                        <li>Diseñar materiales educativos accesibles que expliquen la importancia de comportamientos específicos, como respetar los límites de velocidad.</li>
                        <li>Capacitar a los actores viales en habilidades prácticas, como el uso adecuado del cinturón de seguridad o maniobras defensivas en motocicletas.</li>
                    </ul>
                `
            },
            2: {
                title: "Intervenciones dirigidas a la oportunidad:",
                content: `
                    <ul>
                        <li>Mejorar la infraestructura vial, como instalar más pasos peatonales elevados o carriles exclusivos para ciclistas.</li>
                        <li>Diseñar programas de acceso a recursos, como cascos gratuitos para motociclistas en comunidades de bajos ingresos.</li>
                    </ul>
                `
            },
            3: {
                title: "Intervenciones dirigidas a la motivación:",
                content: `
                    <ul>
                        <li>Crear campañas emocionales que resalten las consecuencias de los comportamientos de riesgo, como videos que muestren testimonios de sobrevivientes de accidentes.</li>
                        <li>Implementar incentivos positivos, como recompensas para los conductores que respeten los límites de velocidad en zonas escolares.</li>
                    </ul>
                `
            }
        };

        const overlay = document.getElementById('modalOverlay');
        const mTitle = document.getElementById('modalTitle');
        const mBody = document.getElementById('modalBody');
        const closeBtn = document.getElementById('closeBtn');
        let activeCardSource = null;

        function openModal(id) {
            mTitle.innerText = data[id].title;
            mBody.innerHTML = data[id].content;
            overlay.classList.add('active');
            closeBtn.focus();
            activeCardSource = document.getElementById(`card-${id}`);
        }

        function closeModalDirect() {
            overlay.classList.remove('active');
            if (activeCardSource) {
                activeCardSource.focus();
            }
        }

        function closeModal(e) {
            if (e.target === overlay) {
                closeModalDirect();
            }
        }

        // Manejo de interacciones de teclado (Cerrar con Escape, Enter o Espacio)
        document.addEventListener('keydown', function(e) {
            const isModalActive = overlay.classList.contains('active');
            
            if (isModalActive) {
                if (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    closeModalDirect();
                }
            } else {
                if (document.activeElement.classList.contains('card')) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        document.activeElement.click();
                    }
                }
            }
        });
    </script>
</body>
</html>
